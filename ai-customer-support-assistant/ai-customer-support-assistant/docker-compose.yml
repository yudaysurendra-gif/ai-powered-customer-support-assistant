version: "3.9"

services:
  api:
    build: .
    container_name: ai-support-assistant-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/support_assistant.db
    command: >
      sh -c "python -m scripts.seed_knowledge_base &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
